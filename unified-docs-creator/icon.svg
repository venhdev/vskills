<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Document body -->
  <rect x="8" y="4" width="40" height="52" rx="4" fill="#1a1a2e" stroke="#3b3b5c" stroke-width="1.5"/>

  <!-- Folded corner -->
  <path d="M36 4 L48 4 L48 16 L36 4Z" fill="#0f3460" stroke="#3b3b5c" stroke-width="1.5"/>
  <path d="M36 4 L36 16 L48 16" stroke="#3b3b5c" stroke-width="1.5"/>

  <!-- Diátaxis 4-quadrant grid inside doc -->

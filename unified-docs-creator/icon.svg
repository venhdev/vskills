  <rect x="13" y="22" width="12" height="12" rx="2" fill="#16537e"/>
  <!-- Top-right: How-to (teal) -->
  <rect x="28" y="22" width="12" height="12" rx="2" fill="#1a936f"/>
  <!-- Bottom-left: Reference (purple) -->
  <rect x="13" y="37" width="12" height="12" rx="2" fill="#7b2d8b"/>
  <!-- Bottom-right: Explanation (amber) -->
  <rect x="28" y="37" width="12" height="12" rx="2" fill="#e09f3e"/>

  <!-- Quadrant labels (tiny dots) -->
  <circle cx="19" cy="28" r="2" fill="#a8dadc" opacity="0.9"/>
  <circle cx="34" cy="28" r="2" fill="#90e0ef" opacity="0.9"/>
  <circle cx="19" cy="43" r="2" fill="#c77dff" opacity="0.9"/>
  <circle cx="34" cy="43" r="2" fill="#ffd166" opacity="0.9"/>

  <!-- Pencil / editing tool (right side) -->
  <rect x="50" y="26" width="6" height="20" rx="2" fill="#e8e8e8" transform="rotate(-20 53 36)"/>
  <path d="M48 46 L53 51 L58 46" fill="#f4a261" stroke="#e76f51" stroke-width="0.5" transform="rotate(-20 53 48)"/>
